<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Produto — MeuCRUD</title>
    <link rel="stylesheet" href="/css/forms.css">
</head>
<body>

    <div class="page-wrapper">

        <div class="page-header">
            <a class="logo" href="/adm">MeuCRUD</a>
        </div>

        <div class="form-card">
            <h2>Cadastrar produto</h2>

            <form action="/produtos" method="POST">

                <div class="form-group">
                    <label for="nome">Nome do produto</label>
                    <input type="text" name="nome" id="nome" placeholder="Ex: Camiseta Básica" required>
                </div>

                <div class="form-group">
                    <label for="preco">Preço (R$)</label>
                    <input type="number" name="preco" id="preco" step="0.01" min="0" placeholder="Ex: 49.90" required>
                </div>

                <div class="form-group">
                    <label for="quantidade">Quantidade em estoque</label>
                    <input type="number" name="quantidade" id="quantidade" min="0" placeholder="Ex: 100" required>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoria</label>
                    <input type="text" name="categoria" id="categoria" placeholder="Ex: Roupas">
                </div>

                <button type="submit" class="btn-submit">Cadastrar</button>

            </form>

            <div class="form-footer">
                <a href="/adm">Voltar ao painel</a>
            </div>
        </div>

    </div>

</body>
</html>
